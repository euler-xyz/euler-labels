name: Sync Hexagate

on:
  pull_request_target:
    branches:
      - master
      - development
  push:
    branches:
      - master
      - development
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode"
        required: true
        default: "dry-run"
        type: choice
        options:
          - dry-run
          - apply
      only:
        description: "Optional comma-separated chainId list (leave blank for all chains)"
        required: false
        default: ""
        type: string

concurrency:
  group: hexagate-sync-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  preview:
    if: github.event_name == 'pull_request_target'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      # Always check out the BASE repository — trusted scripts, lockfile, configs.
      # PR-controlled code (hexagate-sync.js, verify.js, package*.json, etc.) is
      # NEVER placed where node will execute it with HEXAGATE_API_KEY in scope.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Check npm release-age support
        run: |
          version="$(npm --version)"
          node -e '
            const version = process.argv[1];
            const [major, minor] = version.split(".").map(Number);
            if (major < 11 || (major === 11 && minor < 10)) {
              console.error(`npm >=11.10.0 is required for min-release-age; got ${version}`);
              process.exit(1);
            }
            console.log(`npm ${version} supports min-release-age`);
          ' "$version"

      - name: Install dependencies (trusted lockfile)
        run: npm ci --ignore-scripts

      # On PR: check out the PR head into an isolated path so we can copy ONLY
      # the passive data directories ([0-9]+/, all/, logo/) out of it. JS,
      # package.json, package-lock.json, biome.json, etc. are discarded.
      - name: Stage PR head in isolated path
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          path: __pr
          persist-credentials: false

      - name: Overlay PR data directories (passive data only)
        run: |
          set -euo pipefail
          shopt -s nullglob
          for src in __pr/[0-9]*/ __pr/all/ __pr/logo/; do
            name=$(basename "$src")
            if [ -L "${src%/}" ]; then
              echo "::error::Symlinked PR data directory is not allowed: $name"
              exit 1
            fi
            if find "$src" -type l -print -quit | grep -q .; then
              echo "::error::Symlinks are not allowed in PR data directory: $name"
              exit 1
            fi
            rm -rf "./$name"
            cp -R "$src" "./$name"
          done
          rm -rf __pr

      - name: Verify data
        run: node verify.js

      - name: Run Hexagate dry-run
        run: node hexagate-sync.js --dry-run > sync-output.md
        env:
          HEXAGATE_API_KEY: ${{ secrets.HEXAGATE_API_KEY }}

      - name: Build failure comment
        if: failure()
        env:
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          tmp="$(mktemp)"
          {
            echo "# Hexagate sync — failed"
            echo ""
            echo "Workflow run failed. See [the run logs]($RUN_URL) for details."
            if [ -s sync-output.md ]; then
              echo ""
              echo "<details><summary>Partial output</summary>"
              echo ""
              cat sync-output.md
              echo ""
              echo "</details>"
            fi
          } > "$tmp"
          mv "$tmp" sync-output.md

      - name: Comment PR with diff
        if: always()
        uses: marocchino/sticky-pull-request-comment@5770ad5eb8f42dd2c4f34da00c94c5381e49af88 # v2
        with:
          header: hexagate-sync
          path: sync-output.md

      - name: Append sync summary to job summary
        if: always()
        run: |
          if [ -f sync-output.md ]; then
            cat sync-output.md >> "$GITHUB_STEP_SUMMARY"
          fi

  sync:
    if: github.event_name != 'pull_request_target'
    runs-on: ubuntu-latest
    environment: hexagate-sync
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Check npm release-age support
        run: |
          version="$(npm --version)"
          node -e '
            const version = process.argv[1];
            const [major, minor] = version.split(".").map(Number);
            if (major < 11 || (major === 11 && minor < 10)) {
              console.error(`npm >=11.10.0 is required for min-release-age; got ${version}`);
              process.exit(1);
            }
            console.log(`npm ${version} supports min-release-age`);
          ' "$version"

      - name: Install dependencies (trusted lockfile)
        run: npm ci --ignore-scripts

      - name: Verify data
        run: node verify.js

      - name: Resolve sync mode
        id: mode
        env:
          EVENT_NAME: ${{ github.event_name }}
          DISPATCH_MODE: ${{ github.event.inputs.mode }}
          ONLY: ${{ github.event.inputs.only }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          case "$EVENT_NAME" in
            push)
              mode="--apply"
              ;;
            workflow_dispatch)
              case "$DISPATCH_MODE" in
                dry-run)
                  mode="--dry-run"
                  ;;
                apply)
                  case "$REF_NAME" in
                    master|development) mode="--apply" ;;
                    *) echo "::error::Apply mode is only allowed from master or development" ; exit 1 ;;
                  esac
                  ;;
                *) echo "::error::Invalid mode: $DISPATCH_MODE" ; exit 1 ;;
              esac
              ;;
            *)
              mode="--dry-run"
              ;;
          esac
          if [ "$EVENT_NAME" = "workflow_dispatch" ] && [ -n "$ONLY" ]; then
            ONLY="${ONLY//[[:space:]]/}"
            if ! [[ "$ONLY" =~ ^[0-9]+(,[0-9]+)*$ ]]; then
              echo "::error::Invalid only value; expected comma-separated numeric chain IDs"
              exit 1
            fi
            echo "only=$ONLY" >> "$GITHUB_OUTPUT"
          fi
          echo "mode=${mode}" >> "$GITHUB_OUTPUT"

      - name: Run Hexagate sync
        run: |
          set -euo pipefail
          args=("${{ steps.mode.outputs.mode }}")
          if [ -n "${{ steps.mode.outputs.only }}" ]; then
            args+=("--only=${{ steps.mode.outputs.only }}")
          fi
          node hexagate-sync.js "${args[@]}" > sync-output.md
        env:
          HEXAGATE_API_KEY: ${{ secrets.HEXAGATE_API_KEY }}

      - name: Upload sync summary
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sync-output
          path: sync-output.md

      - name: Append sync summary to job summary
        if: always()
        run: |
          if [ -f sync-output.md ]; then
            cat sync-output.md >> "$GITHUB_STEP_SUMMARY"
          fi
