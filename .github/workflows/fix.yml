name: Fix Ethereum Addresses and Formatting

on:
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: read

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: 'npm'

      - name: Check npm release-age support
        run: |
          version="$(npm --version)"
          node -e '
            const version = process.argv[1];
            const [major, minor] = version.split(".").map(Number);
            if (major < 11 || (major === 11 && minor < 10)) {
              console.error(`npm >=11.10.0 is required for min-release-age; got ${version}`);
              process.exit(1);
            }
            console.log(`npm ${version} supports min-release-age`);
          ' "$version"

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Fix addresses and formatting
        run: npm run fix

      - name: Upload fixed label files
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: fixed-labels
          include-hidden-files: false
          if-no-files-found: error
          path: |
            [0-9]*/entities.json
            [0-9]*/points.json
            [0-9]*/products.json
            [0-9]*/assets.json
            [0-9]*/earn-vaults.json
            all/assets.json
            biome.json
            package.json
            package-lock.json

  create-pr:
    runs-on: ubuntu-latest
    needs: generate
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Download fixed label files
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: fixed-labels
          path: .

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          commit-message: 'fix: normalize ethereum addresses and fix biome formatting'
          title: 'fix: normalize ethereum addresses and fix biome formatting'
          body: |
            This PR normalizes Ethereum addresses and fixes Biome formatting issues across all chain files.
            
            Changes made:
            - Normalized checksum addresses in entities.json
            - Normalized checksum addresses in products.json
            - Normalized checksum addresses in points.json
            - Fixed Biome formatting issues (trailing commas, spacing)
            
            This is an automated PR created by the fix workflow.
          branch: fix/addresses-and-formatting
          delete-branch: true
          labels: |
            automated
