version: 2

updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
    cooldown:
      default-days: 7
    allow:
      - dependency-type: "direct"
    groups:
      all-updates:
        update-types:
          - "minor"
          - "patch"
          - "major"
    ignore:
      - dependency-name: "@biomejs/biome"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
    cooldown:
      default-days: 7
    groups:
      all-actions:
        update-types:
          - "minor"
          - "patch"
          - "major"
